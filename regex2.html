<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Atividade Prática - Máscaras JS</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f4f4; }
        form { background: white; padding: 20px; border-radius: 8px; max-width: 400px; margin: auto; }
        .campo { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #218838; }
    </style>
</head>
<body>

    <form id="meuForm">
        <div class="campo">
            <label>Nome Completo:</label>
            <input type="text" id="nome" required placeholder="Fulano de Tal">
        </div>

        <div class="campo">
            <label>CPF:</label>
            <input type="text" id="cpf" maxlength="14" placeholder="000.000.000-00">
        </div>

        <div class="campo">
            <label>Telefone Celular:</label>
            <input type="text" id="telefone" maxlength="15" placeholder="(00) 00000-0000">
        </div>

        <div class="campo">
            <label>Data de Nascimento:</label>
            <input type="text" id="data" maxlength="10" placeholder="00/00/0000">
        </div>

        <div class="campo">
            <label>CEP:</label>
            <input type="text" id="cep" maxlength="9" placeholder="00000-000">
        </div>

        <div class="campo">
            <label>E-mail:</label>
            <input type="email" id="email" required placeholder="email@exemplo.com">
        </div>

        <button type="submit">Enviar Dados</button>
    </form>

    <script>
        const inputCPF = document.getElementById('cpf');
        const inputTel = document.getElementById('telefone');
        const inputData = document.getElementById('data');
        const inputCEP = document.getElementById('cep');

        inputCPF.addEventListener('input', (e) => {
            let v = e.target.value.replace(/\D/g, "");
            v = v.replace(/(\d{3})(\d)/, "$1.$2");
            v = v.replace(/(\d{3})(\d)/, "$1.$2");
            v = v.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
            e.target.value = v;
        });

        inputTel.addEventListener('input', (e) => {
            let v = e.target.value.replace(/\D/g, "");
            v = v.replace(/^(\d{2})(\d)/g, "($1) $2");
            v = v.replace(/(\d{5})(\d)/, "$1-$2");
            e.target.value = v;
        });

        inputData.addEventListener('input', (e) => {
            let v = e.target.value.replace(/\D/g, "");
            v = v.replace(/(\d{2})(\d)/, "$1/$2");
            v = v.replace(/(\d{2})(\d)/, "$1/$2");
            e.target.value = v;
        });

        inputCEP.addEventListener('input', (e) => {
            let v = e.target.value.replace(/\D/g, "");
            v = v.replace(/(\d{5})(\d)/, "$1-$2");
            e.target.value = v;
        });

        document.getElementById('meuForm').onsubmit = function(e) {
            const campos = [
                { el: inputCPF, len: 14 },
                { el: inputTel, len: 15 },
                { el: inputData, len: 10 },
                { el: inputCEP, len: 9 }
            ];
            
            for (let item of campos) {
                if (item.el.value.length > 0 && item.el.value.length < item.len) {
                    alert("O campo " + item.el.id.toUpperCase() + " está incompleto.");
                    e.preventDefault();
                    return;
                }
            }
            alert("Formulário enviado com sucesso!");
        };
    </script>
</body>
</html>
